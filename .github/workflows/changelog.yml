name: Write Changelog

on:
  push:
    branches: [main]
  # Manual replay — paste a SHA from the Actions tab → "Write Changelog"
  # → "Run workflow". Used for backfilling commits that landed while the
  # workflow was failing (e.g. bad secret), or for re-running after a
  # prompt change. The script is idempotent (skips if a changelog entry
  # already exists for the SHA), so re-runs are safe.
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to replay (defaults to current HEAD on main)"
        required: false
        type: string

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Replays need full history to resolve any past commit; pushes
          # only need the parent commit for the diff stat.
          fetch-depth: ${{ inputs.commit_sha && '0' || '2' }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Gather commit info
        id: info
        run: |
          # Target: replay SHA if given (dispatched), else the pushed commit.
          TARGET="${{ inputs.commit_sha || github.sha }}"
          SHA=$(git rev-parse "$TARGET")
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "author=${{ github.event.head_commit.author.username || github.actor }}" >> "$GITHUB_OUTPUT"
          echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

          # Commit message (handle multiline)
          MSG=$(git log -1 --pretty=%B "$SHA")
          {
            echo "msg<<EOFMSG"
            echo "$MSG"
            echo "EOFMSG"
          } >> "$GITHUB_OUTPUT"

          # Diff stat
          DIFF=$(git diff --stat "$SHA^" "$SHA" | tail -1)
          echo "diff_summary=$DIFF" >> "$GITHUB_OUTPUT"

          # PR info (from merge commit message or GitHub event)
          PR_NUM=""
          PR_TITLE=""
          if [[ "$MSG" =~ \#([0-9]+) ]]; then
            PR_NUM="${BASH_REMATCH[1]}"
          fi
          if [ -n "$PR_NUM" ]; then
            # Try to fetch PR title from GitHub API
            PR_TITLE=$(gh pr view "$PR_NUM" --json title --jq .title 2>/dev/null || echo "")
          fi
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "pr_title=$PR_TITLE" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Write changelog entry
        run: npx tsx scripts/write-changelog.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COMMIT_SHA: ${{ steps.info.outputs.sha }}
          COMMIT_MSG: ${{ steps.info.outputs.msg }}
          PR_NUMBER: ${{ steps.info.outputs.pr_number }}
          PR_TITLE: ${{ steps.info.outputs.pr_title }}
          BRANCH: ${{ steps.info.outputs.branch }}
          AUTHOR: ${{ steps.info.outputs.author }}
          DIFF_SUMMARY: ${{ steps.info.outputs.diff_summary }}
