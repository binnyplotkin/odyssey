<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Odyssey — Arc Leap favicon -->
  <!-- Concept: orbital ring arc + hyperspace speed streaks = entering a new domain -->

  <!-- Background -->
  <rect width="100" height="100" fill="#000000" rx="20"/>

  <!-- Everything rotated -22° for that diagonal hyperspace trajectory feel -->
  <g transform="rotate(-22 50 50)">

    <!-- The orbital ring arc: 200° of a bold circle -->
    <!-- Center (65, 50), r=20. Arc starts at 130° (lower-left), sweeps clockwise -->
    <!-- through left → top → upper-right, ending at 330° (upper-right) -->
    <!-- Circumference ≈ 125.7. 200° = 69.8 units. Gap = 55.9 units. -->
    <!-- dashoffset=45 shifts start to 130° position -->
    <circle
      cx="65" cy="50" r="20"
      fill="none"
      stroke="white"
      stroke-width="9"
      stroke-dasharray="70 56"
      stroke-dashoffset="45"
      stroke-linecap="butt"
    />

    <!-- Speed streaks — three tapered lines from the arc opening toward lower-left -->
    <!-- Arc opening is ~at (53, 67) in unrotated space -->
    <line x1="52" y1="61" x2="8"  y2="44" stroke="white" stroke-width="4"   stroke-linecap="round"/>
    <line x1="51" y1="68" x2="6"  y2="62" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="52" y1="75" x2="9"  y2="80" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  </g>
</svg>
